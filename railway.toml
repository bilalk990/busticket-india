[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.env]
NPM_CONFIG_PRODUCTION = "false"
NODE_ENV = "development"

[deploy]
startCommand = "php artisan config:cache && php artisan route:cache && php artisan view:cache && apache2-foreground"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
